[tool.poetry]
name = "matplotloom"
version = "0.3.0"
description = "Weave your frames into easy matplotlib animations."
authors = ["ali-ramadhan <ali.hh.ramadhan@gmail.com>"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.8"
ipython = "^8.0.0"
setuptools = "< 60"


[tool.poetry.group.dev.dependencies]
pytest = "^8.1.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
